    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow-x: hidden;
        }
        .bg-grid {
            background-image: radial-gradient(#27272a 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #6366f1;
            box-shadow: 0 0 15px 4px rgba(99, 102, 241, 0.8), 0 0 30px 10px rgba(99, 102, 241, 0.3);
            animation: scan 2s infinite ease-in-out;
            z-index: 30;
        }
        .scanning-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(99, 102, 241, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 20;
            pointer-events: none;
            animation: gridPulse 4s infinite alternate;
        }
        .scanning-dots {
            position: absolute;
            inset: 0;
            z-index: 25;
            pointer-events: none;
            overflow: hidden;
        }
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #6366f1;
            border-radius: 50%;
            filter: blur(1px);
            animation: blink var(--duration) infinite alternate;
            opacity: 0;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        @keyframes gridPulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }
        @keyframes blink {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(0.5); }
        }
        .glass {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .progress-bar-inner {
            transition: width 0.4s ease-out;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
